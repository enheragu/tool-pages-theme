{% if include.redirect_path %}<script>
  (function () {
    var p = window.location.pathname;
    if (p.slice(-1) !== '/') {
      window.location.replace(p + '/' + window.location.search + window.location.hash);
    }
  })();
</script>{% endif %}
<script>
  (function () {
    var saved = localStorage.getItem('theme');
    var dark = saved ? saved === 'dark' : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
    if (dark) document.documentElement.classList.add('dark');
    // Mark page as pending i18n init to prevent flash of untranslated content.
    // Removed by applyLanguage() in page-shell-core.js after translations run.
    document.documentElement.classList.add('i18n-pending');
  })();
</script>
