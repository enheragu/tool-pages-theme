<title{% if include.title_i18n_key %} data-i18n="{{ include.title_i18n_key }}"{% endif %}>{{ include.title }}</title>
<meta {% if include.with_i18n_meta_ids %}id="meta-description" {% endif %}name="description" content="{{ include.description }}">
<meta name="robots" content="index,follow">
<meta name="theme-color" content="{{ include.theme_color | default: '#58a6ff' }}">
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ include.tool_name }}">
<meta {% if include.with_i18n_meta_ids %}id="meta-og-url" {% endif %}property="og:url" content="{{ include.url }}/">
<meta {% if include.with_i18n_meta_ids %}id="meta-og-locale" {% endif %}property="og:locale" content="{{ include.og_locale | default: 'en_GB' }}">
{% if include.project == 'harris' %}
<meta property="og:locale:alternate" content="es_ES">
{% endif %}
<meta {% if include.with_i18n_meta_ids %}id="meta-og-title" {% endif %}property="og:title" content="{{ include.og_title | default: include.title }}">
<meta {% if include.with_i18n_meta_ids %}id="meta-og-description" {% endif %}property="og:description" content="{{ include.og_description | default: include.description }}">
<meta property="og:image" content="{{ include.og_image | default: include.url | append: '/assets/og-image.png' }}">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="{{ include.og_image_alt | default: include.tool_name | append: ' preview image' }}">
<meta name="twitter:card" content="summary_large_image">
<meta {% if include.with_i18n_meta_ids %}id="meta-twitter-title" {% endif %}name="twitter:title" content="{{ include.twitter_title | default: include.og_title | default: include.title }}">
<meta {% if include.with_i18n_meta_ids %}id="meta-twitter-description" {% endif %}name="twitter:description" content="{{ include.twitter_description | default: include.og_description | default: include.description }}">
<meta name="twitter:image" content="{{ include.og_image | default: include.url | append: '/assets/og-image.png' }}">
{% if include.project == 'harris' %}
<meta name="twitter:image:alt" content="{{ include.og_image_alt | default: include.tool_name | append: ' preview image' }}">
{% endif %}
<link rel="canonical" href="{{ include.url }}/">
<link rel="icon" type="image/svg+xml" href="{{ include.icon_href | default: 'assets/favicon.svg' }}">
<link rel="alternate" hreflang="x-default" href="{{ include.url }}/">
{% if include.lang_mode == 'path' %}
<link rel="alternate" hreflang="en" href="{{ include.url }}/en/">
<link rel="alternate" hreflang="es" href="{{ include.url }}/es/">
{% else %}
<link rel="alternate" hreflang="en" href="{{ include.url }}/?lang=en">
<link rel="alternate" hreflang="es" href="{{ include.url }}/?lang=es">
{% endif %}
{% if include.with_manifest %}
<link rel="manifest" href="manifest.webmanifest">
{% endif %}
