<div class="content-shell">
  <section class="intro-panel">
    <h2 class="shared-intro-title"{% if include.title_id %} id="{{ include.title_id }}"{% endif %}{% if include.title_i18n_key %} data-i18n="{{ include.title_i18n_key }}"{% endif %}>{{ include.title }}</h2>
    <p{% if include.text_id %} id="{{ include.text_id }}"{% endif %}{% if include.text_i18n_key %} data-i18n="{{ include.text_i18n_key }}"{% endif %}{% if include.text_i18n_html_key %} data-i18n-html="{{ include.text_i18n_html_key }}"{% endif %}{% if include.inline_cite %} data-inline-cite{% endif %}>{{ include.text }}</p>
  </section>
</div>
